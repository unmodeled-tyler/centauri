name: Build deb release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.0. Leave blank to use package.json version."
        required: false
        type: string
      tag:
        description: "Release tag. Leave blank to use v<version>."
        required: false
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease/nightly"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-deb-release
  cancel-in-progress: false

jobs:
  build-deb:
    name: Build .deb and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="$PACKAGE_VERSION"; fi
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="v$VERSION"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "deb_name=centauri_${VERSION}_amd64.deb" >> "$GITHUB_OUTPUT"

      - name: Assemble Debian package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          DEB_NAME="${{ steps.meta.outputs.deb_name }}"
          PKG_ROOT="$RUNNER_TEMP/centauri-deb"
          APP_DIR="$PKG_ROOT/opt/centauri"

          rm -rf "$PKG_ROOT"
          mkdir -p "$APP_DIR" "$PKG_ROOT/DEBIAN" "$PKG_ROOT/usr/bin" "$PKG_ROOT/usr/share/applications" "$PKG_ROOT/usr/share/doc/centauri"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='.codex' \
            --exclude='.claude' \
            --exclude='.agents' \
            --exclude='.kilo' \
            --exclude='.gitnexus' \
            --exclude='.remember' \
            --exclude='.superpowers' \
            --exclude='.superpowers-logs' \
            --exclude='test-results' \
            --exclude='*.tsbuildinfo' \
            ./ "$APP_DIR/"

          find "$APP_DIR/node_modules" -type d -name '.cache' -prune -exec rm -rf {} + || true
          find "$APP_DIR" -type f -name '*.log' -delete || true

          cat > "$PKG_ROOT/usr/bin/centauri" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cd /opt/centauri
          exec node /opt/centauri/bin/centauri.js "$@"
          EOF
          chmod 0755 "$PKG_ROOT/usr/bin/centauri"

          cat > "$PKG_ROOT/usr/share/applications/centauri.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Centauri
          Comment=Local-first agent development environment with Git source control
          Exec=centauri
          Terminal=false
          Categories=Development;Utility;
          StartupNotify=true
          EOF

          cp LICENSE "$PKG_ROOT/usr/share/doc/centauri/copyright"
          gzip -c README.md > "$PKG_ROOT/usr/share/doc/centauri/README.md.gz"

          INSTALLED_SIZE="$(du -sk "$PKG_ROOT" | cut -f1)"
          cat > "$PKG_ROOT/DEBIAN/control" <<EOF
          Package: centauri
          Version: $VERSION
          Section: devel
          Priority: optional
          Architecture: amd64
          Depends: nodejs (>= 20), git
          Conflicts: quanta-control
          Replaces: quanta-control
          Installed-Size: $INSTALLED_SIZE
          Maintainer: unmodeled-tyler
          Homepage: https://github.com/unmodeled-tyler/centauri
          Description: Local-first agent development environment with Git source control
           Centauri pairs an embedded CLI agent terminal with a focused Git source-control workspace.
           It runs locally and uses your existing Git, GitHub, and coding-agent CLI tools.
          EOF

          dpkg-deb --build --root-owner-group "$PKG_ROOT" "$DEB_NAME"
          dpkg-deb --info "$DEB_NAME"
          ls -lh "$DEB_NAME"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Centauri ${{ steps.meta.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.deb_name }}
