name: Build macOS universal release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.0. Leave blank to use package.json version."
        required: false
        type: string
      tag:
        description: "Release tag. Leave blank to use v<version>."
        required: false
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease/nightly"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-mac-release
  cancel-in-progress: false

jobs:
  build-mac:
    name: Build universal macOS app and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="$PACKAGE_VERSION"; fi
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="v$VERSION"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Apply release version
        if: steps.meta.outputs.version != ''
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: npm run typecheck

      - name: Build universal macOS package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:mac

      - name: Summarize artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lh release/*.dmg release/*.zip
          {
            echo "## macOS artifacts"
            echo
            for artifact in release/*.dmg release/*.zip; do
              echo "- $(basename "$artifact")"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Centauri ${{ steps.meta.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
